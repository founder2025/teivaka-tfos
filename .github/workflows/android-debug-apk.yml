name: Android debug APK

# Builds an installable, UNSIGNED debug APK of the Teivaka native shell in the
# cloud (GitHub-hosted runners can reach Google's Android repos; the dev sandbox
# can't). Download the artifact from the run, copy to an Android phone, tap to
# install (allow "install from unknown sources"). For testing/validation only —
# Play Store needs a signed release .aab (see frontend/MOBILE_APP.md).

on:
  push:
    branches: [ "claude/beautiful-fermi-F0dLX" ]
    paths:
      - "frontend/**"
      - "capacitor.config.ts"
      - ".github/workflows/android-debug-apk.yml"
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest ships the Android SDK preinstalled with licenses accepted.
      - name: Show Android SDK
        run: echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Install web deps
        working-directory: frontend
        run: npm install

      - name: Build web bundle
        working-directory: frontend
        run: npx vite build

      - name: Add + sync Android platform
        working-directory: frontend
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: teivaka-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
