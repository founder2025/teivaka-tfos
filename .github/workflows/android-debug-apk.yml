name: Android debug APK

# Builds an installable, UNSIGNED debug APK of the Teivaka native shell in the
# cloud (GitHub-hosted runners can reach Google's Android repos; the dev sandbox
# can't). Download the artifact from the run, copy to an Android phone, tap to
# install (allow "install from unknown sources"). For testing/validation only —
# Play Store needs a signed release .aab (see frontend/MOBILE_APP.md).

on:
  push:
    branches: [ "claude/beautiful-fermi-F0dLX" ]
    paths:
      - "frontend/**"
      - ".github/workflows/android-debug-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to publish the APK as a Release asset

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest ships the Android SDK preinstalled with licenses accepted.
      - name: Show Android SDK
        run: echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Install web deps
        working-directory: frontend
        run: npm install

      - name: Build web bundle
        working-directory: frontend
        run: npx vite build

      - name: Add + sync Android platform
        working-directory: frontend
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Rename so the downloaded file is obviously the app, not "app-debug".
      - name: Stage APK
        run: |
          mkdir -p out
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk out/teivaka.apk

      # Belt-and-braces: also keep it as a run artifact.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: teivaka-debug-apk
          path: out/teivaka.apk
          if-no-files-found: error

      # The phone-friendly path: a Release with a DIRECT .apk link (no zip, no login
      # to download). Same stable tag each build, so the link never changes.
      - name: Publish APK to Release (direct download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-debug
          name: "Teivaka Android (debug — latest)"
          body: |
            Latest debug build of the Teivaka Android app for on-phone testing.
            Tap **teivaka.apk** below on your Android phone to install
            (allow "install from unknown sources"). Testing only — not the Play release.
          prerelease: true
          make_latest: "false"
          files: out/teivaka.apk

