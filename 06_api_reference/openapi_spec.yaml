  # ==================== ROTATION ====================

  /rotation/validate:
    post:
      tags: [Rotation]
      summary: Validate crop rotation before cycle creation
      description: |
        Pre-validates a proposed crop rotation. Use before POST /cycles to check feasibility.

        **enforcement_decision values:**
        - `APPROVED`: proceed with cycle creation
        - `BLOCKED`: rotation blocked (same family, insufficient rest). FOUNDER can override.
        - `OVERRIDE_REQUIRED`: soft block (AVOID rule), rotation allowed but flagged

        **rule_status values:**
        - `PREF`: Preferred next crop (best for soil health)
        - `OK`: Acceptable rotation (meets minimum requirements)
        - `AVOID`: Avoid this rotation (soft block)
        - `BLOCK`: Never plant this after previous crop within min_rest_days
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotationValidationRequest'
            examples:
              blocked_same_crop:
                summary: Blocked — Eggplant after Eggplant (20 days, need 60)
                value:
                  pu_id: F001-PU002
                  proposed_production_id: CRP-EGG
                  proposed_planting_date: "2026-04-08"
              approved_different_crop:
                summary: Approved — French Beans after Eggplant
                value:
                  pu_id: F001-PU002
                  proposed_production_id: CRP-FRB
                  proposed_planting_date: "2026-04-08"
      responses:
        '200':
          description: Rotation validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RotationValidationResult'
              examples:
                blocked:
                  summary: BLOCKED result
                  value:
                    success: true
                    data:
                      allowed: false
                      enforcement_decision: BLOCKED
                      rule_status: BLOCK
                      rotation_key: CRP-EGG:CRP-EGG
                      min_rest_days: 60
                      days_since_last_harvest: 20
                      days_short: 40
                      last_production_id: CRP-EGG
                      last_cycle_end_date: "2026-03-18"
                      proposed_planting_date: "2026-04-08"
                      earliest_allowed_date: "2026-05-17"
                      alternatives:
                        - production_id: CRP-FRB
                          production_name: French Beans
                          rule_status: PREF
                          min_rest_days: 0
                          ready_now: true
                        - production_id: CRP-LBN
                          production_name: Long Bean (Yardlong Bean)
                          rule_status: PREF
                          min_rest_days: 0
                          ready_now: true
                        - production_id: CRP-SCN
                          production_name: Sweet Corn
                          rule_status: OK
                          min_rest_days: 30
                          ready_now: false
                          ready_date: "2026-04-17"
                      founder_can_override: true
                approved:
                  summary: APPROVED result
                  value:
                    success: true
                    data:
                      allowed: true
                      enforcement_decision: APPROVED
                      rule_status: PREF
                      rotation_key: CRP-EGG:CRP-FRB
                      min_rest_days: 0
                      days_since_last_harvest: 20
                      days_short: null
                      alternatives: []
                      founder_can_override: false

  # ==================== HARVESTS ====================

  /production-units/{pu_id}/harvests:
    post:
      tags: [Harvests]
      summary: Log harvest with chemical compliance check
      description: |
        Creates a harvest record. **Chemical compliance is checked automatically.**

        If any chemical applied to this PU has a withholding period that has not elapsed,
        the harvest is **BLOCKED (HTTP 409)** with the blocking chemicals listed.

        **Two enforcement layers:**
        1. API-level check here
        2. PostgreSQL trigger `trg_harvest_compliance_check` on `harvest_log` INSERT

        On success: CoKG is recalculated and returned as `new_cogk_fjd`.
      security:
        - BearerAuth: []
      parameters:
        - name: pu_id
          in: path
          required: true
          schema:
            type: string
          example: F001-PU002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HarvestCreate'
            examples:
              compliant_harvest:
                summary: Compliant harvest — after withholding period
                value:
                  harvest_date: "2026-04-15"
                  qty_kg: 42.0
                  grade: A
                  unit_price_fjd: 2.80
                  customer_id: CUS-001
              blocked_harvest:
                summary: Blocked harvest — within Dimethoate 7-day WHD
                value:
                  harvest_date: "2026-04-07"
                  qty_kg: 42.0
                  grade: A
      responses:
        '201':
          description: Harvest logged successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
