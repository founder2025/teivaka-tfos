  # ==================== WEBHOOKS ====================

  /webhooks/whatsapp:
    post:
      tags: [Webhooks]
      summary: Twilio WhatsApp inbound webhook
      description: |
        Receives inbound WhatsApp messages from Twilio.

        **Security:** Twilio HMAC-SHA1 signature verified via `X-Twilio-Signature` header
        using `TWILIO_AUTH_TOKEN`. Requests with invalid signatures return HTTP 403.

        **Flow:**
        1. Verify Twilio signature
        2. Lookup farmer by WhatsApp phone number
        3. Route message text through TIS chat pipeline
        4. Send TIS response back via Twilio API

        **Not a JWT-secured endpoint** — public URL, secured by Twilio signature only.
        Rate limit: 80 messages/minute (Twilio platform limit).
      security: []
      parameters:
        - name: X-Twilio-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA1 signature from Twilio for request validation
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                From:
                  type: string
                  description: Sender's WhatsApp number (format "whatsapp:+679XXXXXXX")
                  example: "whatsapp:+6799XXXXXXX"
                To:
                  type: string
                  description: Teivaka Twilio number
                  example: "whatsapp:+18055551234"
                Body:
                  type: string
                  description: Message text from farmer
                  example: "Harvested 42 kilograms eggplant Grade A on PU002"
                MessageSid:
                  type: string
                  example: SMxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        '200':
          description: |
            Webhook processed. Empty TwiML response — TIS reply sent separately via Twilio API.
          content:
            application/xml:
              example: |
                <?xml version="1.0" encoding="UTF-8"?>
                <Response></Response>
        '403':
          description: Invalid Twilio signature
          content:
            text/plain:
              example: Forbidden

