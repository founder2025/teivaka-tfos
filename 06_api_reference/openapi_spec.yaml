  # ==================== CYCLES ====================

  /production-units/{pu_id}/cycles:
    post:
      tags: [Cycles]
      summary: Create new production cycle
      description: |
        Creates a new cycle on a Production Unit.

        **Rotation validation runs automatically before creation.** If rotation is BLOCKED,
        returns HTTP 409 with details and suggested alternative crops.

        **Enforcement decisions:**
        - `APPROVED`: cycle created immediately
        - `BLOCKED`: HTTP 409 returned — FOUNDER can manually override
        - `OVERRIDE_REQUIRED`: FOUNDER can proceed, other roles receive 409

        A first scheduled task is automatically created upon cycle creation.
      security:
        - BearerAuth: []
      parameters:
        - name: pu_id
          in: path
          required: true
          schema:
            type: string
          example: F001-PU002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CycleCreate'
            examples:
              approved_rotation:
                summary: Approved rotation — Long Bean after Eggplant
                value:
                  production_id: CRP-LBN
                  planting_date: "2026-04-08"
                  area_acres: 1.2
              blocked_rotation:
                summary: Blocked rotation — Eggplant after Eggplant (20 days only, need 60)
                value:
                  production_id: CRP-EGG
                  planting_date: "2026-04-08"
      responses:
        '201':
          description: Cycle created successfully
          content:
            application/json:
              example:
                success: true
                data:
                  cycle_id: CY-F001-26-003
                  pu_id: F001-PU002
                  production_id: CRP-LBN
                  production_name: Long Bean (Yardlong Bean)
                  planting_date: "2026-04-08"
                  stage: Establishment
                  validation_result:
                    allowed: true
                    enforcement_decision: APPROVED
                    rule_status: PREF
                  first_task:
                    task_id: TSK-20260408-001
                    title: Establishment check — CRP-LBN on F001-PU002
                    due_date: "2026-04-15"
                  stage_protocols:
                    - stage: Establishment
                      duration_days: 14
                      key_actions: [Weekly watering, Basal fertiliser application]
                    - stage: Vegetative
                      duration_days: 21
                      key_actions: [NPK every 14 days, Pest scouting]
                    - stage: Fruiting
                      duration_days: 30
                      key_actions: [Potassium top-up, Harvest monitoring]
        '409':
          description: Cycle blocked by rotation validation
          content:
            application/json:
              example:
                success: false
                error:
                  code: ROTATION_BLOCKED
                  message: "Cannot plant CRP-EGG on F001-PU002. Same-family rotation block: 60 days required, only 20 days have passed."
                  details:
                    rotation_blocked: true
                    rotation_validation:
                      allowed: false
                      enforcement_decision: BLOCKED
                      rule_status: BLOCK
                      min_rest_days: 60
                      days_since_last_harvest: 20
                      days_short: 40
                      rotation_key: CRP-EGG:CRP-EGG
                      earliest_allowed_date: "2026-05-17"
                    alternatives:
                      - production_id: CRP-FRB
                        production_name: French Beans
                        rule_status: PREF
                        min_rest_days: 0
                        ready_now: true
                      - production_id: CRP-LBN
                        production_name: Long Bean (Yardlong Bean)
                        rule_status: PREF
                        min_rest_days: 0
                        ready_now: true
                      - production_id: CRP-SCN
                        production_name: Sweet Corn
                        rule_status: OK
                        min_rest_days: 30
                        ready_now: false
                        ready_date: "2026-04-17"

