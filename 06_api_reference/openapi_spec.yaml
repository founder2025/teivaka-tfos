                error:
                  code: COMPLIANCE_VIOLATION
                  message: "Harvest blocked: Dimethoate 40% EC was applied 4 days ago. Withholding period: 7 days. Safe to harvest after 2026-04-10."
                  details:
                    compliance_blocked: true
                    blocking_chemicals:
