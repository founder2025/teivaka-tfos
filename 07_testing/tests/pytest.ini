[pytest]
# Phase 4.2 Step 5-6 — pytest config for TFOS API tests
#
# asyncio_mode = auto lets tests use `async def test_...` without @pytest.mark.asyncio.
#
# asyncio_default_fixture_loop_scope = function — explicit function scope for
# fixtures. Matches pytest-asyncio 0.24 default behavior where tests run on
# function-scope loops. Attempting session scope on fixtures while tests remain
# function scope produces cross-loop errors (asyncpg connections built on the
# session loop attached to future pending on a different loop during test
# execution). The correct fix for the full-suite teardown cascade is
# per-test AsyncSessionLocal() context managers in fixtures (Phase 4.2 cleanup
# task). Until then: tests pass in per-test isolation; full-suite shows 5
# asyncpg teardown-order artifacts ("Event loop is closed" /
# "got result for unknown protocol state 3") that are NOT assertion failures
# and NOT production bugs.
#
# Deployment target: /opt/teivaka/07_testing/tests/pytest.ini

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
