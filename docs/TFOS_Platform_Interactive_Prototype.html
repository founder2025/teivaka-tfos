<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFOS Platform Prototype — Teivaka Farm OS</title>
<style>
/* ============ Palette & tokens ============ */
:root {
  --cream: #F8F3E9;
  --cream-2: #EFE8D8;
  --paper: #FFFFFF;
  --green: #6AA84F;
  --green-dk: #4F8A37;
  --soil: #5C4033;
  --soil-2: #7A5C4E;
  --amber: #BF9000;
  --red: #A32D2D;
  --line: #E2D8C3;
  --ink: #2A2118;
  --muted: #7A6E5C;
  --shadow: 0 2px 8px rgba(92,64,51,0.08);
  --shadow-lg: 0 8px 28px rgba(92,64,51,0.18);
  --topbar-h: 56px;
  --rail-w: 220px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--cream);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}
a { color: var(--green-dk); text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; font-size: 14px; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

/* ============ Top bar ============ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--paper); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; padding: 0 18px; z-index: 1000;
  box-shadow: 0 1px 0 rgba(92,64,51,0.03);
}
.brand { display: flex; align-items: center; gap: 8px; min-width: 200px; cursor: pointer; }
.brand-logo {
  width: 26px; height: 26px; border-radius: 6px; background: var(--green);
  display: flex; align-items: center; justify-content: center; color: white;
}
.brand-text { font-weight: 600; color: var(--soil); font-size: 16px; letter-spacing: -0.2px; }
.topbar-search {
  flex: 0 0 280px; margin-right: 20px;
  display: flex; align-items: center; gap: 8px;
  background: var(--cream-2); border: 1px solid var(--line);
  border-radius: 20px; padding: 7px 14px; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.topbar-search:hover { background: #E8DFC8; }
.topbar-search .search-kbd {
  margin-left: auto; font-size: 11px; color: var(--muted);
  background: var(--paper); padding: 2px 6px; border-radius: 3px; border: 1px solid var(--line);
}
.topbar-pillars { flex: 1; display: flex; justify-content: center; gap: 4px; }
.pillar-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 92px; padding: 6px 14px; border-radius: 8px;
  color: var(--muted); font-size: 12px; font-weight: 500;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.pillar-btn:hover { background: var(--cream-2); color: var(--soil); }
.pillar-btn.active { color: var(--green-dk); border-bottom-color: var(--green); background: rgba(106,168,79,0.08); }
.pillar-btn svg { width: 20px; height: 20px; margin-bottom: 2px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--cream-2); color: var(--soil);
  position: relative; transition: background 0.15s;
}
.icon-btn:hover { background: #E8DFC8; }
.icon-btn svg { width: 18px; height: 18px; }
.icon-badge {
  position: absolute; top: -2px; right: -2px;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--red); color: white; border-radius: 9px;
  font-size: 10px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--paper);
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--green);
  margin: 0 6px; box-shadow: 0 0 0 2px rgba(106,168,79,0.25);
}
.avatar-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--cream-2); border-radius: 20px; padding: 3px 10px 3px 3px;
  color: var(--soil); font-size: 12px; font-weight: 500;
  transition: background 0.15s;
}
.avatar-btn:hover { background: #E8DFC8; }
.avatar-circle {
  width: 32px; height: 32px; border-radius: 50%; background: var(--green);
  color: white; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px;
}

/* ============ Dropdowns ============ */
.dropdown {
  position: fixed; top: calc(var(--topbar-h) + 8px); right: 18px;
  width: 360px; max-height: 500px; overflow: hidden;
  background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
  box-shadow: var(--shadow-lg); z-index: 1100;
  display: none; flex-direction: column;
}
.dropdown.show { display: flex; }
.dropdown-head {
  padding: 14px 16px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.dropdown-head h3 { margin: 0; font-size: 15px; color: var(--soil); font-weight: 600; }
.dropdown-head button { font-size: 12px; color: var(--green-dk); }
.dropdown-body { overflow-y: auto; max-height: 400px; }
.dropdown-foot {
  padding: 10px 16px; border-top: 1px solid var(--line);
  text-align: center; font-size: 12px;
}
.dropdown-foot a { color: var(--green-dk); font-weight: 500; }

/* Notification dropdown */
.notif-item {
  display: flex; gap: 10px; padding: 12px 16px;
  border-bottom: 1px solid var(--line); transition: background 0.15s; cursor: pointer;
}
.notif-item:hover { background: var(--cream); }
.notif-item:last-child { border-bottom: none; }
.notif-sev {
  width: 6px; border-radius: 3px; flex-shrink: 0;
}
.notif-sev.critical { background: var(--red); }
.notif-sev.high { background: var(--amber); }
.notif-sev.med { background: var(--green); }
.notif-title { font-size: 13px; color: var(--soil); font-weight: 600; margin-bottom: 2px; }
.notif-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
.notif-body { font-size: 12px; color: var(--muted); }
.sev-badge {
  display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 5px;
  border-radius: 3px; margin-right: 4px; letter-spacing: 0.5px;
}
.sev-badge.critical { background: var(--red); color: white; }
.sev-badge.high { background: var(--amber); color: white; }
.sev-badge.med { background: var(--green); color: white; }

/* Messages dropdown */
.msg-controls {
  padding: 10px 16px; display: flex; gap: 8px; border-bottom: 1px solid var(--line);
}
.msg-controls input {
  flex: 1; padding: 7px 12px; border: 1px solid var(--line); border-radius: 18px;
  background: var(--cream); color: var(--ink);
}
.msg-controls button {
  padding: 7px 12px; background: var(--green); color: white; border-radius: 18px;
  font-size: 12px; font-weight: 500;
}
.msg-item {
  display: flex; gap: 10px; padding: 10px 16px; cursor: pointer;
  border-bottom: 1px solid var(--line); transition: background 0.15s; align-items: center;
}
.msg-item:hover { background: var(--cream); }
.msg-item:last-child { border-bottom: none; }
.msg-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--soil-2);
  color: white; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; flex-shrink: 0;
}
.msg-name { font-size: 13px; color: var(--soil); font-weight: 600; }
.msg-preview { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
.msg-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-left: auto; }

/* Avatar dropdown */
.avatar-head {
  padding: 16px; background: var(--cream); border-bottom: 1px solid var(--line);
  display: flex; gap: 12px; align-items: center;
}
.avatar-head .avatar-circle { width: 48px; height: 48px; font-size: 16px; }
.avatar-head-name { font-size: 14px; color: var(--soil); font-weight: 600; }
.avatar-head-email { font-size: 12px; color: var(--muted); }
.avatar-head-tier { display: inline-block; margin-top: 3px; font-size: 10px; font-weight: 700; padding: 1px 6px; background: var(--green); color: white; border-radius: 3px; letter-spacing: 0.5px; }
.avatar-item {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; color: var(--soil); font-size: 13px; text-align: left;
  transition: background 0.15s; border-bottom: 1px solid var(--line);
}
.avatar-item:hover { background: var(--cream); }
.avatar-item:last-child { border-bottom: none; color: var(--red); }
.avatar-item svg { width: 16px; height: 16px; color: var(--muted); }
.avatar-item.has-submenu::after { content: '›'; margin-left: auto; color: var(--muted); font-size: 18px; }
.avatar-submenu {
  display: none; background: var(--cream); border-top: 1px solid var(--line);
}
.avatar-submenu.show { display: block; }
.avatar-submenu button {
  display: block; width: 100%; text-align: left; padding: 8px 16px 8px 42px;
  font-size: 12px; color: var(--soil); transition: background 0.15s;
}
.avatar-submenu button:hover { background: var(--cream-2); }
.avatar-submenu button.active { color: var(--green-dk); font-weight: 600; }

/* ============ Shell layout ============ */
.shell {
  display: flex; margin-top: var(--topbar-h); min-height: calc(100vh - var(--topbar-h));
}
.left-rail {
  width: var(--rail-w); flex-shrink: 0;
  background: var(--paper); border-right: 1px solid var(--line);
  padding: 20px 0 20px 0; position: sticky; top: var(--topbar-h);
  height: calc(100vh - var(--topbar-h)); overflow-y: auto;
}
.rail-head { padding: 0 16px 12px 16px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.rail-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  color: var(--soil); font-size: 13px; transition: all 0.15s; cursor: pointer;
  border-left: 3px solid transparent;
}
.rail-item:hover { background: var(--cream); }
.rail-item.active { background: rgba(106,168,79,0.1); color: var(--green-dk); border-left-color: var(--green); font-weight: 600; }
.rail-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.rail-item .rail-badge { margin-left: auto; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; background: var(--red); color: white; }
.main-content {
  flex: 1; padding: 22px 28px; display: flex; justify-content: center;
  min-width: 0;
}
.main-inner { width: 100%; max-width: 1200px; }

/* ============ Page content ============ */
.page-header {
  margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.page-header h1 { margin: 0; font-size: 22px; color: var(--soil); font-weight: 600; letter-spacing: -0.3px; }
.page-header .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
  transition: all 0.15s; border: 1px solid transparent;
}
.btn-primary { background: var(--green); color: white; }
.btn-primary:hover { background: var(--green-dk); }
.btn-secondary { background: var(--paper); color: var(--soil); border-color: var(--line); }
.btn-secondary:hover { background: var(--cream); }
.btn-danger { background: var(--red); color: white; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn svg { width: 14px; height: 14px; }

.card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px;
}
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-head h3 { margin: 0; font-size: 15px; color: var(--soil); font-weight: 600; }
.card-head .card-meta { font-size: 12px; color: var(--muted); }

.metrics-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.metric-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  padding: 14px 16px; transition: transform 0.15s, box-shadow 0.15s;
}
.metric-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.metric-value { font-size: 22px; color: var(--soil); font-weight: 600; margin-top: 4px; line-height: 1.1; }
.metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.metric-trend { font-size: 11px; font-weight: 600; margin-left: 6px; }
.metric-trend.up { color: var(--green-dk); }
.metric-trend.down { color: var(--red); }
.metric-trend.warn { color: var(--amber); }

.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 12px; font-size: 11px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  border-bottom: 1px solid var(--line);
}
.data-table td {
  padding: 12px; font-size: 13px; color: var(--soil);
  border-bottom: 1px solid var(--line);
}
.data-table tr:hover td { background: var(--cream); }
.data-table tr:last-child td { border-bottom: none; }
.pill {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.pill.green { background: rgba(106,168,79,0.15); color: var(--green-dk); }
.pill.amber { background: rgba(191,144,0,0.15); color: var(--amber); }
.pill.red { background: rgba(163,45,45,0.15); color: var(--red); }
.pill.grey { background: var(--cream-2); color: var(--muted); }

/* ============ Top task card ============ */
.top-task-card {
  background: linear-gradient(135deg, var(--green) 0%, var(--green-dk) 100%);
  color: white; border-radius: 12px; padding: 18px 20px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 16px;
}
.top-task-icon {
  width: 44px; height: 44px; background: rgba(255,255,255,0.18);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.top-task-icon svg { width: 22px; height: 22px; }
.top-task-body { flex: 1; }
.top-task-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.85; font-weight: 600; }
.top-task-title { font-size: 15px; font-weight: 600; margin-top: 3px; }
.top-task-meta { font-size: 12px; opacity: 0.85; margin-top: 4px; }
.top-task-actions { display: flex; gap: 8px; flex-shrink: 0; }
.top-task-actions button {
  padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  background: white; color: var(--green-dk); transition: transform 0.15s;
}
.top-task-actions button:hover { transform: translateY(-1px); }
.top-task-actions button.secondary { background: rgba(255,255,255,0.18); color: white; }

/* ============ Mode selector inline ============ */
.mode-selector-inline {
  background: var(--cream-2); border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; color: var(--soil); display: inline-flex; align-items: center; gap: 8px;
}
.mode-selector-inline select {
  border: none; background: transparent; color: var(--green-dk); font-weight: 600; cursor: pointer;
}
.farm-selector {
  background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 12px; font-size: 13px; color: var(--soil);
  display: inline-flex; align-items: center; gap: 6px;
}
.farm-selector select {
  border: none; background: transparent; color: var(--soil); font-weight: 600; cursor: pointer;
}

/* ============ TIS FAB ============ */
.tis-fab {
  position: fixed; bottom: 22px; right: 22px; width: 56px; height: 56px;
  border-radius: 50%; background: var(--green); color: white;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(106,168,79,0.45); z-index: 900;
  transition: transform 0.15s, box-shadow 0.15s;
}
.tis-fab:hover { transform: scale(1.05); box-shadow: 0 8px 28px rgba(106,168,79,0.55); }
.tis-fab svg { width: 26px; height: 26px; }
.fab-badge {
  position: absolute; top: 2px; right: 2px; width: 12px; height: 12px;
  border-radius: 50%; background: var(--red); border: 2px solid white;
}
.tis-fab-panel {
  position: fixed; bottom: 92px; right: 22px; width: 360px; height: 540px;
  max-height: calc(100vh - 120px); background: var(--paper);
  border: 1px solid var(--line); border-radius: 14px;
  box-shadow: var(--shadow-lg); z-index: 901; display: none;
  flex-direction: column; overflow: hidden;
}
.tis-fab-panel.show { display: flex; animation: fab-slide 0.2s ease-out; }
@keyframes fab-slide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.fab-head {
  background: var(--green); color: white; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.fab-head h4 { margin: 0; font-size: 14px; font-weight: 600; }
.fab-head button { color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.fab-head button:hover { background: rgba(255,255,255,0.2); }
.fab-body {
  flex: 1; overflow-y: auto; padding: 16px; background: var(--cream);
  display: flex; flex-direction: column; gap: 10px;
}
.fab-msg { max-width: 85%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; }
.fab-msg.tis { background: var(--paper); color: var(--soil); border: 1px solid var(--line); align-self: flex-start; border-bottom-left-radius: 4px; }
.fab-msg.user { background: var(--green); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.fab-msg .msg-source { font-size: 10px; color: var(--muted); margin-top: 3px; font-style: italic; }
.fab-suggest { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.fab-suggest button {
  padding: 6px 10px; font-size: 11px; background: var(--paper);
  color: var(--green-dk); border: 1px solid var(--green);
  border-radius: 14px; transition: all 0.15s;
}
.fab-suggest button:hover { background: var(--green); color: white; }
.fab-input {
  display: flex; gap: 6px; padding: 12px; border-top: 1px solid var(--line);
  background: var(--paper);
}
.fab-input input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--line);
  border-radius: 20px; background: var(--cream); color: var(--ink);
}
.fab-input input:focus { outline: none; border-color: var(--green); }
.fab-input button {
  width: 36px; height: 36px; border-radius: 50%; background: var(--green);
  color: white; display: flex; align-items: center; justify-content: center;
}
.fab-input button svg { width: 14px; height: 14px; }

/* ============ Toast stack ============ */
.toast-stack {
  position: fixed; bottom: 92px; right: 92px; z-index: 1200;
  display: flex; flex-direction: column; gap: 8px; max-width: 380px;
  pointer-events: none;
}
.toast {
  background: var(--paper); border: 1px solid var(--line);
  border-left: 4px solid var(--green); border-radius: 8px;
  padding: 12px 14px; box-shadow: var(--shadow);
  animation: toast-in 0.25s ease-out; pointer-events: auto;
  display: flex; gap: 10px; align-items: flex-start;
}
.toast.warning { border-left-color: var(--amber); }
.toast.error { border-left-color: var(--red); }
.toast.info { border-left-color: var(--soil-2); }
.toast-icon { flex-shrink: 0; color: var(--green); }
.toast.warning .toast-icon { color: var(--amber); }
.toast.error .toast-icon { color: var(--red); }
.toast-body { flex: 1; }
.toast-title { font-size: 13px; color: var(--soil); font-weight: 600; }
.toast-msg { font-size: 12px; color: var(--muted); margin-top: 2px; }
.toast-audit { font-size: 10px; color: var(--muted); font-family: monospace; margin-top: 4px; }
@keyframes toast-in { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ============ Search overlay ============ */
.overlay-backdrop {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(42,33,24,0.5); z-index: 1300;
  display: none; align-items: flex-start; justify-content: center; padding-top: 120px;
}
.overlay-backdrop.show { display: flex; }
.search-overlay {
  width: 90%; max-width: 560px; background: var(--paper);
  border-radius: 12px; box-shadow: var(--shadow-lg); overflow: hidden;
}
.search-overlay-input {
  width: 100%; padding: 16px 20px; border: none; font-size: 16px;
  background: var(--paper); color: var(--ink); border-bottom: 1px solid var(--line);
}
.search-overlay-input:focus { outline: none; }
.search-results { padding: 8px 0; max-height: 360px; overflow-y: auto; }
.search-result {
  padding: 10px 20px; font-size: 13px; color: var(--soil);
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.search-result:hover { background: var(--cream); }
.search-result svg { width: 16px; height: 16px; color: var(--muted); }
.search-result .search-result-hint { margin-left: auto; font-size: 11px; color: var(--muted); }

/* ============ Chat shell (in-app) ============ */
.chat-shell {
  display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - var(--topbar-h) - 70px);
  border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--paper);
}
.chat-list {
  border-right: 1px solid var(--line); background: var(--cream);
  overflow-y: auto;
}
.chat-list-head { padding: 12px 14px; border-bottom: 1px solid var(--line); font-weight: 600; color: var(--soil); display: flex; justify-content: space-between; align-items: center; }
.chat-list-search { padding: 10px 14px; border-bottom: 1px solid var(--line); }
.chat-list-search input { width: 100%; padding: 7px 12px; border-radius: 18px; border: 1px solid var(--line); background: var(--paper); }
.chat-item {
  display: flex; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background 0.15s; align-items: center;
}
.chat-item:hover { background: var(--cream-2); }
.chat-item.active { background: rgba(106,168,79,0.12); border-left: 3px solid var(--green); padding-left: 11px; }
.chat-window { display: flex; flex-direction: column; background: var(--cream); }
.chat-head { padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--paper); display: flex; align-items: center; gap: 10px; }
.chat-head-name { font-weight: 600; color: var(--soil); }
.chat-head-status { font-size: 11px; color: var(--muted); margin-top: 2px; }
.chat-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { max-width: 70%; padding: 9px 13px; border-radius: 14px; font-size: 13px; }
.chat-msg.them { background: var(--paper); color: var(--soil); border: 1px solid var(--line); align-self: flex-start; border-bottom-left-radius: 4px; }
.chat-msg.me { background: var(--green); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.chat-msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; }
.chat-msg.me .chat-msg-time { color: rgba(255,255,255,0.8); }
.chat-compose { padding: 12px 14px; border-top: 1px solid var(--line); background: var(--paper); display: flex; gap: 8px; }
.chat-compose input { flex: 1; padding: 9px 14px; border: 1px solid var(--line); border-radius: 20px; background: var(--cream); }

/* ============ Solo mode ============ */
.solo-shell {
  max-width: 380px; margin: 40px auto; background: var(--paper);
  border-radius: 28px; overflow: hidden; box-shadow: var(--shadow-lg);
  border: 8px solid #1a1a1a;
}
.solo-status { background: #1a1a1a; color: white; text-align: center; padding: 6px 0; font-size: 11px; letter-spacing: 1px; }
.solo-screen {
  background: var(--cream); min-height: 560px; padding: 24px 20px;
  display: flex; flex-direction: column;
}
.solo-greeting { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
.solo-farm { font-size: 18px; font-weight: 600; color: var(--soil); margin-bottom: 20px; }
.solo-task {
  background: var(--paper); border: 2px solid var(--green); border-radius: 16px;
  padding: 22px; box-shadow: 0 4px 20px rgba(106,168,79,0.25); margin-bottom: 18px;
}
.solo-task-icon {
  width: 56px; height: 56px; border-radius: 14px; background: var(--green);
  color: white; display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.solo-task-icon svg { width: 28px; height: 28px; }
.solo-task-title { font-size: 18px; color: var(--soil); font-weight: 600; line-height: 1.3; margin-bottom: 6px; }
.solo-task-meta { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.solo-voice {
  background: var(--cream-2); border-radius: 10px; padding: 10px 14px;
  font-size: 12px; color: var(--soil); display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
}
.solo-voice .solo-voice-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }
.solo-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.solo-btn {
  padding: 14px 0; border-radius: 12px; font-size: 14px; font-weight: 600;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.solo-btn-done { background: var(--green); color: white; }
.solo-btn-skip { background: var(--cream-2); color: var(--soil); }
.solo-btn-help { background: var(--amber); color: white; }
.solo-btn svg { width: 20px; height: 20px; }
.solo-footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px; }

/* ============ Feed (Home) ============ */
.feed-post {
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow);
}
.feed-post-head { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); }
.feed-post-body { padding: 14px 16px; font-size: 14px; color: var(--soil); line-height: 1.5; }
.feed-post-img { background: linear-gradient(135deg, #E8DFC8 0%, #C8B98F 100%); height: 180px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
.feed-post-actions { padding: 10px 16px; display: flex; gap: 16px; border-top: 1px solid var(--line); }
.feed-post-actions button { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.feed-post-actions button:hover { color: var(--green-dk); }

/* ============ Marketplace ============ */
.marketplace-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 14px; margin-top: 12px;
}
.mk-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  overflow: hidden; transition: transform 0.15s; cursor: pointer;
}
.mk-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.mk-img { height: 120px; background: linear-gradient(135deg, #E8DFC8, #C8B98F); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 11px; }
.mk-body { padding: 12px; }
.mk-title { font-size: 13px; font-weight: 600; color: var(--soil); margin-bottom: 4px; }
.mk-price { font-size: 15px; color: var(--green-dk); font-weight: 600; }
.mk-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ============ Classroom tracks ============ */
.track-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  padding: 16px; margin-bottom: 12px; display: flex; gap: 14px; align-items: center;
  transition: border-color 0.15s; cursor: pointer;
}
.track-card:hover { border-color: var(--green); }
.track-icon { width: 48px; height: 48px; border-radius: 10px; background: rgba(106,168,79,0.15); color: var(--green-dk); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.track-icon svg { width: 24px; height: 24px; }
.track-body { flex: 1; }
.track-title { font-size: 14px; font-weight: 600; color: var(--soil); }
.track-progress-bar { background: var(--cream-2); height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
.track-progress-fill { background: var(--green); height: 100%; border-radius: 3px; transition: width 0.3s; }
.track-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* ============ Compliance status ============ */
.compliance-row {
  padding: 14px 16px; border: 1px solid var(--line); border-radius: 8px;
  background: var(--paper); margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
}
.compliance-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.compliance-icon.ok { background: rgba(106,168,79,0.15); color: var(--green-dk); }
.compliance-icon.warn { background: rgba(191,144,0,0.15); color: var(--amber); }
.compliance-icon.block { background: rgba(163,45,45,0.15); color: var(--red); }
.compliance-body { flex: 1; }
.compliance-title { font-size: 13px; color: var(--soil); font-weight: 600; }
.compliance-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ============ Form elements ============ */
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); color: var(--ink); }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: var(--green); }

/* ============ Modal ============ */
.modal {
  width: 90%; max-width: 520px; background: var(--paper); border-radius: 12px;
  box-shadow: var(--shadow-lg); overflow: hidden;
}
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { margin: 0; font-size: 16px; color: var(--soil); font-weight: 600; }
.modal-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 8px; background: var(--cream); }

/* ============ Responsive ============ */
@media (max-width: 900px) {
  :root { --rail-w: 60px; }
  .rail-head, .rail-item span { display: none; }
  .rail-item { justify-content: center; padding: 12px; }
  .topbar-search { display: none; }
  .pillar-btn { min-width: 60px; padding: 4px 8px; }
  .pillar-btn span { display: none; }
  .main-content { padding: 16px; }
}

</style>
</head>

<!-- =========================== TOP BAR =========================== -->

  <div class="brand" onclick="go('home','feed')">

    <div class="brand-text">teivaka</div>
  </div>
  <div class="topbar-search" onclick="openSearch()">
    <span id="searchIcon"></span>

    <span class="search-kbd">⌘K</span>

  <div class="topbar-pillars" id="topbarPillars"></div>

    <div class="status-dot" title="All systems synced"></div>
    <button class="icon-btn" onclick="toggleDrop('msgDropdown', event)" title="Messages">
      <span id="msgIcon"></span>
      <span class="icon-badge" id="msgBadge">2</span>
    </button>
    <button class="icon-btn" onclick="toggleDrop('notifDropdown', event)" title="Notifications">
      <span id="bellIcon"></span>
      <span class="icon-badge" id="notifBadge">3</span>
    </button>
    <button class="avatar-btn" onclick="toggleDrop('avatarDropdown', event)" title="Account">
      <div class="avatar-circle">UK</div>
      <span id="chevDown"></span>
    </button>
  </div>
</header>

<!-- =========================== DROPDOWNS =========================== -->
<div class="dropdown" id="notifDropdown">
  <div class="dropdown-head">
    <h3>Notifications</h3>
    <button onclick="markAllRead()">Mark all read</button>
  </div>
  <div class="dropdown-body" id="notifList"></div>
  <div class="dropdown-foot"><a onclick="go('farm','compliance')">View all</a></div>
</div>

<div class="dropdown" id="msgDropdown">
  <div class="dropdown-head">
    <h3>Messages</h3>
    <button onclick="newChat()">+ New</button>
  </div>
  <div class="msg-controls">
    <input placeholder="Search people…" />
  </div>
  <div class="dropdown-body" id="msgList"></div>
  <div class="dropdown-foot"><a onclick="openFullChat()">Open Messages</a></div>
</div>

<div class="dropdown" id="avatarDropdown" style="width: 280px;">
  <div class="avatar-head">
    <div class="avatar-circle">UK</div>
    <div>
      <div class="avatar-head-name">Uraia Koroi Kama</div>
      <div class="avatar-head-email">founder@teivaka.com</div>
      <span class="avatar-head-tier">PREMIUM</span>
    </div>
  </div>
  <div id="avatarItems"></div>
</div>

<!-- =========================== SHELL =========================== -->
<div class="shell" id="shell">
  <aside class="left-rail" id="leftRail"></aside>
  <main class="main-content">
    <div class="main-inner" id="mainInner"></div>
  </main>
</div>

<!-- =========================== TIS FAB =========================== -->
<button class="tis-fab" id="tisFab" onclick="toggleFab()" title="Ask TIS">
  <span id="fabIcon"></span>
  <span class="fab-badge" id="fabUnread"></span>
</button>
<div class="tis-fab-panel" id="tisFabPanel">
  <div class="fab-head">
    <h4>TIS — Farm Intelligence</h4>
    <button onclick="closeFab()"><span id="fabClose"></span></button>
  </div>
  <div class="fab-body" id="fabBody">
    <div class="fab-msg tis">
      Bula Boss. How can I help with the farm today?
      <div class="msg-source">Fiji Intelligence Layer · Layer 2</div>
    </div>
    <div class="fab-suggest">
      <button onclick="fabSuggest('When can I harvest eggplant after Karate Zeon?')">Chemical WHD check</button>
      <button onclick="fabSuggest('Kava leaves yellowing — what now?')">Kava dieback</button>
      <button onclick="fabSuggest('Nayans Grade A eggplant size?')">Nayans grade</button>
      <button onclick="fabSuggest('Show my 7-day cashflow')">Cash runway</button>
    </div>
  </div>
  <div class="fab-input">
    <input id="fabInput" placeholder="Ask TIS anything…" onkeydown="if(event.key==='Enter') sendFab()" />
    <button onclick="sendFab()"><span id="fabSend"></span></button>
  </div>
</div>

<!-- =========================== TOAST STACK =========================== -->
<div class="toast-stack" id="toastStack"></div>

<!-- =========================== OVERLAY (search/modal) =========================== -->
<div class="overlay-backdrop" id="overlay" onclick="if(event.target.id==='overlay') closeOverlay()">
  <div id="overlayContent"></div>
</div>

function render() {

  if (state.shellMode === 'solo') {
    document.getElementById('leftRail').style.display = 'none';
    document.getElementById('mainInner').innerHTML = renderSolo();

  }
  document.getElementById('leftRail').style.display = '';
  renderLeftRail();
  const pillar = state.pillar;
  const sub = state.sub[pillar];

  if (pillar === 'home')      main.innerHTML = renderHome(sub);
  else if (pillar === 'classroom') main.innerHTML = renderClassroom(sub);
  else if (pillar === 'farm')      main.innerHTML = renderFarm(sub);

}

      + '<div style="font-size:16px;color:var(--soil);font-weight:600;margin-top:14px">Hold to talk</div>'
      + '<div style="font-size:12px;color:var(--muted);margin-top:4px">Press and hold the mic · release to send</div>'
      + '<button class="btn btn-primary" onclick="toast(\'Voice\',\'Whisper pipeline mock — Fijian + English supported\',\'info\')" style="margin-top:20px">'+svg('mic',14)+'Start test</button>'
      + '</div>';
  } else if (sub === 'plan_my_farm') {
    return pageHead('Plan my farm', 'TIS Farm Plan · multi-season rotation + buyer demand + weather')
      + '<div class="card"><p style="color:var(--muted)">Upload current cycles → TIS generates 12-month rotation plan based on soil test, rotation rules, and Nayans demand signals.</p>'
      + '<button class="btn btn-primary" onclick="toast(\'Plan\',\'12-month plan generated · Cassava → Eggplant → Kava overlap\',\'success\',\'d3b8902a\')">'+svg('sparkles',14)+'Generate 12-month plan</button></div>';
  } else if (sub === 'usage') {
    return pageHead('Usage', 'Your TIS activity')
      + '<div class="metrics-grid">'
      + '<div class="metric-card"><div class="metric-label">Queries this month</div><div class="metric-value">47</div><div class="metric-sub">Of unlimited (Premium)</div></div>'
      + '<div class="metric-card"><div class="metric-label">KB Layer 1 hits</div><div class="metric-value">31</div><div class="metric-sub">66%</div></div>'
      + '<div class="metric-card"><div class="metric-label">Fiji Layer 2</div><div class="metric-value">14</div><div class="metric-sub">30%</div></div>'
      + '<div class="metric-card"><div class="metric-label">General Layer 3</div><div class="metric-value">2</div><div class="metric-sub">4%</div></div>'
      + '</div>';
  }
  return pageHead('TIS');
}

function renderTISInitial() {
  return '<div class="fab-msg tis" style="max-width:80%">Bula Boss. I can answer chemical, crop, livestock, and financial questions. I cite my sources: Layer 1 (validated KB), Layer 2 (Fiji Intelligence), Layer 3 (general agronomy — last resort).<div class="msg-source">TIS · Fiji Intelligence Layer · ready</div></div>';
}

function askTIS(q) {
  if (!q || !q.trim()) return;
  const area = document.getElementById('tisChatArea');
  area.insertAdjacentHTML('beforeend', '<div class="fab-msg user" style="max-width:80%;margin-left:auto;margin-top:10px">'+q+'</div>');
  document.getElementById('tisInput').value = '';
  setTimeout(() => {
    let reply = ''; let layer = 'Layer 2 · Fiji Intelligence';
    if (/karate|whd|withhold|harvest.*after/i.test(q)) {
      reply = 'Karate Zeon 5CS on eggplant: 7-day withholding period. Last applied 2026-04-21 on F001-PU002 → cleared to harvest from 2026-04-28.';
      layer = 'Layer 1 · Validated KB (chemical_library)';
    } else if (/kava|dieback|yellow/i.test(q)) {
      reply = 'Yellowing kava leaves usually indicate kava dieback disease (Phytophthora). Check root colour — black and soft = advanced. Treatment: copper oxychloride 2g/L foliar, every 14 days, avoid wet-season application. Harvest withholding 14 days.';
    } else if (/nayans|grade/i.test(q)) {
      reply = 'Nayans Grade A eggplant: 250–400g per fruit, glossy purple, no cracks or sunburn, stem intact. Grade B (150–250g or minor blemish): 70% of A price.';
    } else if (/cash|runway|13.*week|forecast/i.test(q)) {
      reply = 'Week 6 forecast shows -FJD 120 based on scheduled NPK order (FJD 82) and Laisenia weekly wage. Suggest deferring NPK 10 days or drawing on Nayans Thursday receipt.';
    } else {
      reply = 'Based on Fiji agricultural practice, I would need more context. Can you share the crop, PU, and date range?';
    }
    area.insertAdjacentHTML('beforeend', '<div class="fab-msg tis" style="max-width:80%;margin-top:10px">'+reply+'<div class="msg-source">'+layer+'</div></div>');
    area.scrollTop = area.scrollHeight;
  }, 500);
}

/* =================================================================
 *  HELPERS — page header, pillar navigation, toasts
 * ================================================================= */
function pageHead(title, subtitle, actions) {
  return '<div class="page-header"><div><h1>'+title+'</h1>'
    + (subtitle ? '<div class="subtitle">'+subtitle+'</div>' : '')
    + '</div>' + (actions ? '<div class="page-actions">'+actions+'</div>' : '') + '</div>';
}

function go(pillar, sub) {
  closeAllDrops();
  state.pillar = pillar;
  if (sub) state.sub[pillar] = sub;
  renderTopbar();
  render();
}
function switchFarm(f) { state.farm = f; render(); toast('Farm context', 'Switched to '+f, 'info'); }
function switchMode(m) {
  state.shellMode = m;
  closeAllDrops();
  renderTopbar();
  render();
  toast('Mode switched', 'Shell mode: '+m.toUpperCase()+(m==='solo' ? ' · one-card, three-button' : ''), 'info');
}
function toggleAvatarSubmenu(k) {
  const el = document.getElementById('submenu_'+k);
  if (el.classList.contains('show')) el.classList.remove('show');
  else el.classList.add('show');
}

/* =================================================================
 *  TOASTS + AUDIT HASH (simulated)
 * ================================================================= */
function auditHash() {
  const chars = '0123456789abcdef'; let s = '';
  for (let i = 0; i < 8; i++) s += chars[Math.floor(Math.random()*16)];
  return s;
}
function toast(title, msg, type, hash) {
  type = type || 'success';
  const icon = type === 'warning' ? svg('alert',16) : type === 'error' ? svg('x',16) : type === 'info' ? svg('bell',16) : svg('check',16);
  const h = hash || auditHash();
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = '<div class="toast-icon">'+icon+'</div><div class="toast-body"><div class="toast-title">'+title+'</div><div class="toast-msg">'+msg+'</div><div class="toast-audit">audit.events · '+h+'</div></div>';
  document.getElementById('toastStack').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(()=>el.remove(), 300); }, 4200);
}

/* =================================================================
 *  ACTIONS (new cycle / log harvest / complete task / etc)
 * ================================================================= */
function newCycle() {
  openOverlay('<div class="modal">'
    + '<div class="modal-head"><h3>New production cycle</h3><button onclick="closeOverlay()">'+svg('x',16)+'</button></div>'
    + '<div class="modal-body">'
    +   '<div class="form-row"><label>Production (94 available)</label><select><option>PU-002 · Eggplant · F001 Bed 3</option><option>PU-003 · Cassava · F001</option><option>PU-001 · Kava · F001 shade</option><option>PU-LIV-GOA · Goat herd · F002</option></select></div>'
    +   '<div class="form-row"><label>Location (Block)</label><select><option>LOC-F001-01 · Bed 1</option><option>LOC-F001-02 · Bed 2</option><option>LOC-F001-03 · Bed 3</option></select></div>'
    +   '<div class="form-row"><label>Planting date</label><input type="date" value="2026-04-25" /></div>'
    +   '<div class="form-row"><label>Rotation check</label><div class="pill green">PREF · Cassava after eggplant is preferred rotation</div></div>'
    + '</div>'
    + '<div class="modal-foot"><button class="btn btn-secondary" onclick="closeOverlay()">Cancel</button><button class="btn btn-primary" onclick="confirmCycle()">'+svg('check',14)+'Create cycle</button></div>'
    + '</div>');
}
function confirmCycle() { closeOverlay(); toast('Cycle created', 'CYC-F001-PU002-2026-004 · Planted 2026-04-25 · audit row emitted', 'success'); }

function logHarvest() {
  openOverlay('<div class="modal">'
    + '<div class="modal-head"><h3>Log harvest</h3><button onclick="closeOverlay()">'+svg('x',16)+'</button></div>'
    + '<div class="modal-body">'
    +   '<div style="background:rgba(106,168,79,0.1);border-left:3px solid var(--green);padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:12px;color:var(--soil)"><strong>409 Compliance check:</strong> F001-PU002 BLOCKED until 2026-04-28 (Karate Zeon WHD)</div>'
    +   '<div class="form-row"><label>PU</label><select><option>PU-003 · Cassava (no block)</option><option disabled>PU-002 · Eggplant — BLOCKED</option></select></div>'
    +   '<div class="form-row"><label>Quantity (kg)</label><input type="number" value="45" /></div>'
    +   '<div class="form-row"><label>Grade</label><select><option>A</option><option>B</option><option>Reject</option></select></div>'
    +   '<div class="form-row"><label>Buyer</label><select><option>Nayans Supermarkets</option><option>Local market</option></select></div>'
    +   '<div class="form-row"><label>Voice note (optional)</label><div style="padding:10px;background:var(--cream-2);border-radius:6px;text-align:center;color:var(--muted);font-size:12px">'+svg('mic',14)+' Hold to record</div></div>'
    + '</div>'
    + '<div class="modal-foot"><button class="btn btn-secondary" onclick="closeOverlay()">Cancel</button><button class="btn btn-primary" onclick="confirmHarvest()">'+svg('check',14)+'Log harvest</button></div>'
    + '</div>');
}
function confirmHarvest() { closeOverlay(); toast('Harvest logged', '45kg cassava · PU-003 · audit.events HARVEST_LOGGED emitted', 'success'); }

function completeTask(id) {
  state.completedTasks.add(id);
  toast('Task completed', 'TASK_COMPLETED row emitted to audit.events', 'success');
  render();
}
function completeTopTask() { toast('Top task done', 'Water eggplant · TASK_COMPLETED · audit hash chained', 'success'); }

/* =================================================================
 *  DROPDOWNS + OVERLAYS
 * ================================================================= */
function toggleDrop(id, ev) {
  if (ev) ev.stopPropagation();
  const target = document.getElementById(id);
  const wasOpen = target.classList.contains('show');
  closeAllDrops();
  if (!wasOpen) target.classList.add('show');
}
function closeAllDrops() {
  ['notifDropdown','msgDropdown','avatarDropdown'].forEach(id => document.getElementById(id).classList.remove('show'));
  document.querySelectorAll('.avatar-submenu').forEach(el => el.classList.remove('show'));
}
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown') && !e.target.closest('.icon-btn') && !e.target.closest('.avatar-btn')) {
    closeAllDrops();
  }
});
function markAllRead() { state.notifRead = true; toast('Notifications', 'All marked read'); renderTopbar(); closeAllDrops(); }
function openNotif(id) { const n = NOTIFICATIONS.find(x=>x.id===id); toast(n.title, n.body, n.sev==='critical'?'error':n.sev==='high'?'warning':'info'); closeAllDrops(); }
function newChat() { toast('New chat', 'Contact picker would open'); closeAllDrops(); }
function openFullChat() { go('home','directory'); closeAllDrops(); }
function openChatFromDrop(id) { closeAllDrops(); state.activeChat = id; toast('Chat', 'Opened chat with ' + (CHATS.find(c=>c.id===id)?.name || id), 'info'); }

function openOverlay(html) { document.getElementById('overlayContent').innerHTML = html; document.getElementById('overlay').classList.add('show'); }
function closeOverlay() { document.getElementById('overlay').classList.remove('show'); document.getElementById('overlayContent').innerHTML = ''; }

function openSearch() {
  openOverlay('<div class="search-overlay">'
    + '<input class="search-overlay-input" id="searchOverlayInput" placeholder="Search farm, tasks, people, KB…" oninput="updateSearchResults(this.value)" />'
    + '<div class="search-results" id="searchResults"></div>'
    + '</div>');
  setTimeout(()=>document.getElementById('searchOverlayInput').focus(), 50);
  updateSearchResults('');
}
function updateSearchResults(q) {
  const entries = [
    { label: 'F001 · Save-A-Lot Farm',       icon: 'map',      go: ['farm','overview'] },
    { label: 'Tasks',                        icon: 'check',    go: ['farm','tasks'] },
    { label: 'Compliance · F001-PU002',      icon: 'shield',   go: ['farm','compliance'] },
    { label: 'Cash ledger',                  icon: 'dollar',   go: ['farm','cash'] },
    { label: 'Karate Zeon WHD',              icon: 'sparkles', action: "askTISFromSearch('When can I harvest after Karate Zeon?')" },
    { label: 'Laisenia Waqa',                icon: 'user',     action: "openChatFromDrop('laisenia')" },
    { label: 'Marketplace',                  icon: 'bag',      go: ['home','marketplace'] },
    { label: 'Bank evidence reports',        icon: 'file',     go: ['farm','reports'] }
  ];
  const ql = (q || '').toLowerCase();
  const hits = entries.filter(e => !ql || e.label.toLowerCase().includes(ql));
  document.getElementById('searchResults').innerHTML = hits.map((h, i) => {
    const onclick = h.go ? 'go(\''+h.go[0]+'\',\''+h.go[1]+'\'); closeOverlay()' : h.action+'; closeOverlay()';
    return '<div class="search-result" onclick="'+onclick+'">'+svg(h.icon,16)+h.label+'<span class="search-result-hint">↵</span></div>';
  }).join('');
}
function askTISFromSearch(q) { go('tis','chat'); setTimeout(() => askTIS(q), 100); }

/* =================================================================
 *  TIS FAB
 * ================================================================= */
function toggleFab() {
  const p = document.getElementById('tisFabPanel');
  if (p.classList.contains('show')) p.classList.remove('show');
  else { p.classList.add('show'); document.getElementById('fabUnread').style.display = 'none'; setTimeout(()=>document.getElementById('fabInput').focus(), 150); }
}
function closeFab() { document.getElementById('tisFabPanel').classList.remove('show'); }
function fabSuggest(q) { document.getElementById('fabInput').value = q; sendFab(); }
function sendFab() {
  const inp = document.getElementById('fabInput');
  const q = inp.value.trim();
  if (!q) return;
  const body = document.getElementById('fabBody');
  body.insertAdjacentHTML('beforeend', '<div class="fab-msg user">'+q+'</div>');
  inp.value = '';
  setTimeout(() => {
    let reply, layer = 'Layer 2 · Fiji Intelligence';
    if (/karate|whd/i.test(q)) { reply = 'Karate Zeon 5CS: 7-day WHD on eggplant. F001-PU002 last applied 2026-04-21 → cleared from 2026-04-28.'; layer = 'Layer 1 · Validated KB'; }
    else if (/kava|yellow|dieback/i.test(q)) { reply = 'Kava dieback (Phytophthora). Copper oxychloride 2g/L foliar, every 14 days. 14-day WHD. Dry season only.'; }
    else if (/nayans|grade/i.test(q)) { reply = 'Nayans Grade A eggplant: 250–400g, glossy purple, no cracks, stem intact.'; }
    else if (/cash|runway|forecast/i.test(q)) { reply = 'Week 6 forecast: -FJD 120. Defer NPK order 10 days OR draw Nayans Thursday receipt (FJD 260).'; }
    else { reply = 'I need more context — crop, PU, date range. Try one of the suggest buttons for a worked example.'; }
    body.insertAdjacentHTML('beforeend', '<div class="fab-msg tis">'+reply+'<div class="msg-source">'+layer+'</div></div>');
    body.scrollTop = body.scrollHeight;
  }, 500);
}

/* =================================================================
 *  KEYBOARD SHORTCUTS
 * ================================================================= */
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openSearch(); }
  else if (e.key === 'Escape') { closeOverlay(); closeAllDrops(); closeFab(); }
  else if (e.key.toLowerCase() === 'l' && !e.target.matches('input, textarea')) {
    const r = document.getElementById('leftRail');
    r.style.display = r.style.display === 'none' ? '' : 'none';
  }
});

/* =================================================================
 *  INIT
 * ================================================================= */
renderTopbar();
render();
// Unread FAB badge
document.getElementById('fabUnread').style.display = 'block';
</script>
</body>
</html>
