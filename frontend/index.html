<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Teivaka — Farm Operating System for Pacific Island Farmers</title>
    <meta name="description" content="Teivaka is the farm management platform built for Pacific Island farmers. Plan crops, track harvests, manage workers, and get AI agronomic advice — built in Fiji, for the Pacific." />
    <meta name="keywords" content="farm management, Fiji farming, Pacific agriculture, farm software, crop tracking, Teivaka, agri-business Fiji" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://teivaka.com/" />

    <!-- Open Graph (Facebook, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://teivaka.com/" />
    <meta property="og:title" content="Teivaka — Farm Operating System for Pacific Island Farmers" />
    <meta property="og:description" content="Plan crops, track harvests, manage workers, and get AI agronomic advice — built in Fiji, for the Pacific." />
    <meta property="og:image" content="https://teivaka.com/og-image.png" />
    <meta property="og:site_name" content="Teivaka" />
    <meta property="og:locale" content="en_FJ" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Teivaka — Farm OS for Pacific Island Farmers" />
    <meta name="twitter:description" content="Plan crops, track harvests, manage workers, and get AI agronomic advice — built in Fiji, for the Pacific." />
    <meta name="twitter:image" content="https://teivaka.com/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Teivaka",
      "description": "Farm operating system built for Pacific Island farmers. Crop planning, harvest tracking, AI agronomic advice.",
      "url": "https://teivaka.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "FJD",
        "description": "Free forever for your first farm"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Teivaka PTE LTD",
        "url": "https://teivaka.com",
        "foundingLocation": "Fiji",
        "areaServed": "Pacific Islands"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest?v=2" />
    <meta name="theme-color" content="#6AA84F" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS (for CommunityMap) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</html>
